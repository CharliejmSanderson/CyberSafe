<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Cyber Safety Game Hub</title>

  <link rel="stylesheet" href="menu-style.css" />
</head>

<body>
  <main class="container">

    <div class="speech-controls">
      <button onclick="speakIntro()">🔊 Listen</button>
      <button onclick="stopSpeech()">⏹ Stop</button>
    </div>

    <p class="subtitle">SELECT YOUR GAME</p>

    <h1 class="title">GAME HUB</h1>

    <section class="games">

      <button class="card blue" onclick="launchGame('../bullying-roleplay/index.html')">
        <div class="emoji">🛡️</div>
        <h2>Bullying<br>Roleplay</h2>
        <p>Practice safe responses to online bullying.</p>
      </button>

      <button class="card pink" onclick="launchGame('../online-dating/index.html')">
        <div class="emoji">💕</div>
        <h2>Online Dating<br>Safety</h2>
        <p>Learn safe choices in online dating chats.</p>
      </button>

      <button class="card green" onclick="launchGame('password-checker/passwordchecker.html')">
        <div class="emoji">🔐</div>
        <h2>Password<br>Checker</h2>
        <p>Check password strength and improve it.</p>
      </button>

      <button class="card orange" onclick="launchGame('../spot-the-scam/index.html')">
        <div class="emoji">🔍</div>
        <h2>Spot The<br>Scam</h2>
        <p>Find fake messages, emails, and scams.</p>
      </button>

      <button class="card purple" onclick="launchGame('../safe-posting/index.html')">
        <div class="emoji">📱</div>
        <h2>Safe Posting<br>Online</h2>
        <p>Decide what is safe to post online.</p>
      </button>

    </section>

    <p class="footer">CLICK A CARD TO LAUNCH</p>

  </main>

  <script src="menu-script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safe Online Dating</title>

  <style>

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #d9d9d9;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px 0;
    }

    .phone {
      width: 360px;
      height: 640px;
      background: #ffffff;
      border-radius: 25px;
      overflow: hidden;
      box-shadow: 0 0 24px rgba(0, 0, 0, 0.25);
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: #d49a6a;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: bold;
      font-size: 16px;
      color: #ffffff;
      flex-shrink: 0;
    }

    .topbar-btn {
      background: none;
      border: none;
      color: #ffffff;
      font-size: 22px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      line-height: 1;
    }

    .topbar-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    #screen {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .home-header {
      background: linear-gradient(135deg, #d49a6a 0%, #c4856a 100%);
      padding: 24px 20px 20px;
      text-align: center;
      color: #ffffff;
      flex-shrink: 0;
    }

    .home-header .home-icon {
      font-size: 40px;
      margin-bottom: 8px;
    }

    .home-header h1 {
      font-size: 22px;
      font-weight: bold;
    }

    .home-header p {
      font-size: 14px;
      margin-top: 6px;
      opacity: 0.9;
    }

    .levels-label {
      padding: 18px 16px 8px;
      font-size: 13px;
      font-weight: bold;
      color: #888888;
      letter-spacing: 1px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .level-card {
      margin: 8px 14px;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      border: 3px solid transparent;
      transition: transform 0.1s, box-shadow 0.1s;
      flex-shrink: 0;
    }

    .level-card:active {
      transform: scale(0.97);
    }

    .level-card.unlocked {
      background: #f5f5f5;
      border-color: #9ad1c1;
      box-shadow: 0 2px 8px rgba(154, 209, 193, 0.3);
      cursor: pointer;
    }

    .level-card.unlocked:hover {
      box-shadow: 0 4px 14px rgba(154, 209, 193, 0.5);
    }

    .level-card.completed {
      background: #e8f5f2;
      border-color: #66bb6a;
      cursor: pointer;
    }

    .level-card.locked {
      background: #f0f0f0;
      border-color: #dddddd;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .level-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #9ad1c1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }

    .level-card.locked .level-avatar {
      background: #dddddd;
    }

    .level-info {
      flex: 1;
    }

    .level-info .level-num {
      font-size: 11px;
      font-weight: bold;
      color: #d49a6a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .level-info .level-name {
      font-size: 16px;
      font-weight: bold;
      color: #333333;
      margin: 2px 0;
    }

    .level-info .level-desc {
      font-size: 13px;
      color: #666666;
    }

    .level-badge {
      font-size: 22px;
      flex-shrink: 0;
    }

    .chat-header {
      background: #4b5d57;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #ffffff;
      flex-shrink: 0;
    }

    .chat-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #9ad1c1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .chat-header-text .chat-name {
      font-weight: bold;
      font-size: 15px;
    }

    .chat-header-text .chat-tagline {
      font-size: 12px;
      opacity: 0.8;
    }


    .chat-messages {
      background: #e8f4f1;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }

    .bubble {
      max-width: 75%;
      padding: 11px 14px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.4;
      animation: popIn 0.2s ease;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.92) translateY(4px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);   }
    }

    /* Other person's message - left */
    .bubble.them {
      background: #4b5d57;
      color: #ffffff;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
    }

    /* Player's message - right */
    .bubble.me {
      background: #f5d3a6;
      color: #333333;
      border-bottom-right-radius: 4px;
      align-self: flex-end;
    }

    /* Typing indicator */
    .typing {
      background: #4b5d57;
      color: #ffffff;
      padding: 11px 14px;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      font-size: 20px;
      letter-spacing: 2px;
    }

    .choices-area {
      background: #ffffff;
      padding: 12px;
      flex-shrink: 0;
      border-top: 2px solid #e0e0e0;
    }

    .choices-label {
      font-size: 12px;
      font-weight: bold;
      color: #888888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .choice-btn {
      width: 100%;
      padding: 13px 16px;
      margin-bottom: 8px;
      border: 2px solid #9ad1c1;
      border-radius: 14px;
      background: #f0faf7;
      color: #333333;
      font-family: Arial, sans-serif;
      font-size: 14px;
      font-weight: bold;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      line-height: 1.4;
    }

    .choice-btn:last-child {
      margin-bottom: 0;
    }

    .choice-btn:hover {
      background: #d4ede8;
      border-color: #4b5d57;
    }

    .choice-btn:active {
      transform: scale(0.98);
    }

    .flag-area {
      background: #ffffff;
      padding: 14px 12px;
      border-top: 2px solid #e0e0e0;
      flex-shrink: 0;
    }

    .flag-label {
      font-size: 12px;
      font-weight: bold;
      color: #888888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: center;
      margin-bottom: 10px;
    }

    .flag-row {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .flag-btn {
      flex: 1;
      padding: 14px 4px;
      border: none;
      border-radius: 14px;
      font-family: Arial, sans-serif;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: transform 0.1s, opacity 0.2s, box-shadow 0.2s;
    }

    .flag-btn:active {
      transform: scale(0.96);
    }

    .flag-btn.red-flag {
      background: #ef5350;
      color: #ffffff;
      box-shadow: 0 3px 8px rgba(239, 83, 80, 0.3);
    }

    .flag-btn.yellow-flag {
      background: #f9a825;
      color: #1a1a1a;
      box-shadow: 0 3px 8px rgba(249, 168, 37, 0.3);
    }

    .flag-btn.green-flag {
      background: #66bb6a;
      color: #ffffff;
      box-shadow: 0 3px 8px rgba(102, 187, 106, 0.3);
    }

    .flag-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .result-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      gap: 14px;
    }

    .result-verdict {
      background: #9ad1c1;
      border-radius: 20px;
      padding: 24px 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .result-verdict .verdict-icon {
      font-size: 48px;
    }

    .result-verdict .verdict-title {
      font-size: 18px;
      font-weight: bold;
      color: #333333;
      margin: 10px 0 4px;
    }

    .result-verdict .verdict-flag {
      font-size: 17px;
      font-weight: bold;
      margin: 6px 0;
    }

    .result-verdict .verdict-flag.correct { color: #2e7d32; }
    .result-verdict .verdict-flag.close   { color: #e65100; }
    .result-verdict .verdict-flag.wrong   { color: #c62828; }

    .result-verdict .verdict-answer {
      margin-top: 8px;
      font-size: 14px;
      color: #444444;
    }

    .result-explanation {
      background: #f5f5f5;
      border-radius: 16px;
      padding: 16px;
      flex-shrink: 0;
    }

    .result-explanation h3 {
      font-size: 15px;
      font-weight: bold;
      color: #4b5d57;
      margin-bottom: 8px;
    }

    .result-explanation p {
      font-size: 14px;
      line-height: 1.6;
      color: #444444;
    }

    .result-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
      padding-bottom: 4px;
    }

    .action-btn {
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-family: Arial, sans-serif;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .action-btn:active {
      transform: scale(0.97);
    }

    .action-btn.primary {
      background: #d49a6a;
      color: #ffffff;
      box-shadow: 0 3px 10px rgba(212, 154, 106, 0.35);
    }

    .action-btn.secondary {
      background: #f5f5f5;
      color: #4b5d57;
      border: 2px solid #9ad1c1;
    }

  </style>
</head>

<body>
  <div class="phone">
    <div class="topbar">
      <button class="topbar-btn" onclick="window.location.href='../MainMenu/mainmenu.html'" aria-label="Back to main menu">&#8592;</button>
      <span>Safe Online Dating</span>
      <button class="topbar-btn" aria-label="Settings">&#9881;&#65039;</button>
    </div>

    <div id="screen"></div>

  </div>
  <script src="SafeDating_levels.js"></script>
  <script src="SafeDating.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bullying Roleplay</title>

  <style>

    /* CSS VARIABLES - DEFAULT THEME */

    :root {
      --bg:                  #ffffff;
      --topbar:              #2e7d32;
      --topbar-text:         #ffffff;
      --chat-header-bg:      #2e7d32;
      --chat-header-text:    #ffffff;
      --chat-bg:             #e8f5e9;
      --bubble-them-bg:      #2e7d32;
      --bubble-them-text:    #ffffff;
      --bubble-me-bg:        #c8e6c9;
      --bubble-me-text:      #111111;
      --choice-bg:           #f1f8f1;
      --choice-border:       #66bb6a;
      --choice-text:         #222222;
      --panel-bg:            #ffffff;
      --panel-border:        #e0e0e0;
      --label-text:          #888888;
      --modal-overlay:       rgba(0,0,0,0.55);
      --modal-bg:            #ffffff;
      --modal-text:          #333333;
      --setting-option-bg:   #f5f5f5;
      --setting-option-text: #333333;
      --setting-active-bg:   #2e7d32;
      --setting-active-text: #ffffff;
      --font-scale: 1;
    }

    /* THEME - HIGH CONTRAST DARK */

    body.theme-dark {
      --bg:                  #121212;
      --topbar:              #000000;
      --topbar-text:         #ffd400;
      --chat-header-bg:      #000000;
      --chat-header-text:    #ffd400;
      --chat-bg:             #1a1a1a;
      --bubble-them-bg:      #2c2c2c;
      --bubble-them-text:    #ffffff;
      --bubble-me-bg:        #3a3a2a;
      --bubble-me-text:      #ffffff;
      --choice-bg:           #1e1e1e;
      --choice-border:       #ffd400;
      --choice-text:         #ffffff;
      --panel-bg:            #1e1e1e;
      --panel-border:        #444444;
      --label-text:          #aaaaaa;
      --modal-bg:            #1e1e1e;
      --modal-text:          #ffffff;
      --setting-option-bg:   #2c2c2c;
      --setting-option-text: #ffffff;
      --setting-active-bg:   #ffd400;
      --setting-active-text: #000000;
    }

    /* THEME - HIGH CONTRAST LIGHT */

    body.theme-light {
      --topbar:              #0066cc;
      --topbar-text:         #ffffff;
      --chat-header-bg:      #0066cc;
      --choice-border:       #0066cc;
      --setting-active-bg:   #0066cc;
      --setting-active-text: #ffffff;
    }

    /* THEME - BLUE-YELLOW ACCESSIBLE */

    body.theme-blueyellow {
      --bg:                  #0d2b45;
      --topbar:              #ffd600;
      --topbar-text:         #000000;
      --chat-header-bg:      #133c5a;
      --chat-header-text:    #ffffff;
      --chat-bg:             #0a2236;
      --bubble-them-bg:      #1a4a6e;
      --bubble-them-text:    #ffffff;
      --bubble-me-bg:        #ffd600;
      --bubble-me-text:      #000000;
      --choice-bg:           #133c5a;
      --choice-border:       #ffd600;
      --choice-text:         #ffffff;
      --panel-bg:            #0d2b45;
      --panel-border:        #ffd600;
      --label-text:          #ffd600;
      --modal-bg:            #0d2b45;
      --modal-text:          #ffffff;
      --setting-option-bg:   #133c5a;
      --setting-option-text: #ffffff;
      --setting-active-bg:   #ffd600;
      --setting-active-text: #000000;
    }

    /* BASE */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: calc(16px * var(--font-scale)); }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      transition: background 0.3s;
    }

    /* TOPBAR */

    .topbar {
      width: 100%;
      background: var(--topbar);
      color: var(--topbar-text);
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.4rem;
      color: var(--topbar-text);
      padding: 2px;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }

    .topbar-title {
      font-weight: bold;
      font-size: 1rem;
    }

    /* CONTENT COLUMN */

    .content {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    /* HOME SCREEN - CHAT LIST */

    .chat-list { display: flex; flex-direction: column; gap: 0; }

    .chat-item {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--panel-border);
      cursor: pointer;
      background: var(--panel-bg);
      -webkit-tap-highlight-color: transparent;
    }

    .chat-item:active { opacity: 0.7; }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: var(--choice-border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 14px;
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .chat-item-name {
      font-weight: bold;
      font-size: 1rem;
      color: var(--choice-text);
    }

    /* PROGRESS CARD */

    .progress-card {
      margin: 16px 0;
      padding: 16px;
      background: var(--topbar);
      color: var(--topbar-text);
      border-radius: 16px;
    }

    .progress-card h3 { font-size: 1rem; margin-bottom: 6px; }
    .progress-card p  { font-size: 0.875rem; margin-bottom: 6px; }

    .progress-bar-bg {
      background: rgba(255,255,255,0.3);
      border-radius: 20px;
      height: 12px;
      margin: 8px 0;
      overflow: hidden;
    }

    .progress-bar-fill {
      background: white;
      height: 100%;
      border-radius: 20px;
      transition: width 0.4s ease;
    }

    /* ACHIEVEMENTS */

    .achievements { margin-top: 4px; }
    .achievements h4 { font-size: 0.95rem; color: var(--choice-text); margin-bottom: 10px; }

    .achievement-card {
      display: flex;
      align-items: center;
      background: var(--choice-bg);
      border: 2px solid var(--choice-border);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .icon-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--topbar);
      color: var(--topbar-text);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .achievement-text { flex: 1; font-size: 0.875rem; color: var(--choice-text); }
    .achievement-text small { display: block; color: var(--label-text); }
    .achievement-unlocked { color: #2e7d32; font-size: 0.75rem; font-weight: bold; }

    /* CHAT SCREEN */

    .chat-header {
      background: var(--chat-header-bg);
      color: var(--chat-header-text);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-header-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .chat-header-name { font-weight: bold; font-size: 0.95rem; }

    .chat-area {
      background: var(--chat-bg);
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 280px;
    }

    .bubble-wrap-them { display: flex; align-items: flex-end; gap: 8px; }
    .bubble-wrap-me   { display: flex; justify-content: flex-end; }

    .bubble-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--chat-header-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      max-width: 75%;
      font-size: 1rem;
      line-height: 1.45;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bubble-them {
      background: var(--bubble-them-bg);
      color: var(--bubble-them-text);
      border-bottom-left-radius: 4px;
    }

    .bubble-me {
      background: var(--bubble-me-bg);
      color: var(--bubble-me-text);
      border-bottom-right-radius: 4px;
    }

    .bubble-speak {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      opacity: 0.7;
      padding: 0;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    /* TYPING INDICATOR */

    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .typing-dots {
      background: var(--bubble-them-bg);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .typing-dots span {
      width: 7px;
      height: 7px;
      background: var(--bubble-them-text);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
      opacity: 0.6;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-6px); }
    }

    /* CHOICES */

    .choices-area {
      background: var(--panel-bg);
      padding: 12px 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .choices-label {
      font-size: 0.75rem;
      font-weight: bold;
      color: var(--label-text);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .choice-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .choice-btn {
      flex: 1;
      padding: 12px 14px;
      border-radius: 14px;
      border: 2px solid var(--choice-border);
      background: var(--choice-bg);
      color: var(--choice-text);
      font-family: Arial, sans-serif;
      font-size: 0.9rem;
      font-weight: bold;
      text-align: left;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }

    .choice-btn:active { opacity: 0.75; }
    .choice-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .choice-speak {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--choice-bg);
      border: 2px solid var(--choice-border);
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    /* RESULT SCREEN */

    .result-area {
      padding: 24px 16px 40px;
      text-align: center;
    }

    .result-icon { font-size: 3rem; margin-bottom: 10px; }

    .result-title {
      font-size: 1.4rem;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .result-correct { color: #2e7d32; }
    .result-wrong   { color: #c62828; }

    .result-explanation {
      background: var(--choice-bg);
      border: 2px solid var(--choice-border);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 0.95rem;
      color: var(--choice-text);
      line-height: 1.5;
      text-align: left;
      margin: 14px 0 20px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .result-progress-label {
      font-size: 0.875rem;
      color: var(--label-text);
      margin-bottom: 6px;
    }

    .result-progress-bar-bg {
      background: var(--panel-border);
      border-radius: 20px;
      height: 14px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .result-progress-bar-fill {
      background: var(--topbar);
      height: 100%;
      border-radius: 20px;
      transition: width 0.4s ease;
    }

    .back-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: var(--topbar);
      color: var(--topbar-text);
      font-family: Arial, sans-serif;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* SETTINGS MODAL */

    .settings-overlay {
      position: fixed;
      inset: 0;
      background: var(--modal-overlay);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 100;
    }

    .settings-overlay.active { display: flex; }

    .settings-box {
      background: var(--modal-bg);
      width: 100%;
      max-width: 480px;
      border-radius: 20px 20px 0 0;
      padding: 20px 18px 30px;
      position: relative;
    }

    .settings-title {
      font-size: 1.25rem;
      font-weight: bold;
      color: var(--modal-text);
      margin-bottom: 18px;
    }

    .settings-section {
      font-size: 0.75rem;
      font-weight: bold;
      color: var(--label-text);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 16px 0 8px;
    }

    .setting-option {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 8px;
      border-radius: 12px;
      border: 2px solid var(--panel-border);
      background: var(--setting-option-bg);
      color: var(--setting-option-text);
      font-family: Arial, sans-serif;
      font-size: 0.9375rem;
      font-weight: bold;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s;
    }

    .setting-option.active {
      background: var(--setting-active-bg);
      color: var(--setting-active-text);
      border-color: var(--setting-active-bg);
    }

    .setting-option:last-child { margin-bottom: 0; }

    .size-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    .tts-toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-radius: 12px;
      border: 2px solid var(--panel-border);
      background: var(--setting-option-bg);
      margin-bottom: 8px;
    }

    .tts-toggle-label {
      font-size: 0.9375rem;
      font-weight: bold;
      color: var(--setting-option-text);
    }

    .toggle-switch {
      position: relative;
      width: 48px;
      height: 26px;
      flex-shrink: 0;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: #cccccc;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: #ffffff;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: transform 0.2s;
    }

    .toggle-switch input:checked + .toggle-track { background: #66bb6a; }
    .toggle-switch input:checked + .toggle-track::after { transform: translateX(22px); }

    .settings-close-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--panel-border);
      color: var(--modal-text);
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

  </style>
</head>

<body>

<div id="screen"></div>

<!-- SETTINGS MODAL -->
<div class="settings-overlay" id="settingsOverlay" role="dialog" aria-modal="true" aria-label="Settings">
  <div class="settings-box">

    <button class="settings-close-btn" onclick="closeSettings()" aria-label="Close settings">&#215;</button>
    <div class="settings-title">Settings</div>

    <div class="settings-section">Theme</div>
    <button class="setting-option active" id="theme-default" onclick="setTheme('default',this)">Default</button>
    <button class="setting-option" id="theme-dark"      onclick="setTheme('dark',this)">High Contrast Dark</button>
    <button class="setting-option" id="theme-light"     onclick="setTheme('light',this)">High Contrast Light</button>
    <button class="setting-option" id="theme-blueyellow" onclick="setTheme('blueyellow',this)">Blue-Yellow Accessible</button>

    <div class="settings-section">Text Size</div>
    <div class="size-grid">
      <button class="setting-option" data-scale="0.85" onclick="setTextSize(this)">Small</button>
      <button class="setting-option active" data-scale="1" onclick="setTextSize(this)">Medium</button>
      <button class="setting-option" data-scale="1.2" onclick="setTextSize(this)">Large</button>
      <button class="setting-option" data-scale="1.4" onclick="setTextSize(this)">Extra Large</button>
    </div>

    <div class="settings-section">Accessibility</div>
    <div class="tts-toggle-row">
      <span class="tts-toggle-label">&#128266; Read messages aloud</span>
      <label class="toggle-switch" aria-label="Enable text to speech">
        <input type="checkbox" id="ttsToggle" onchange="handleTtsToggle()">
        <span class="toggle-track"></span>
      </label>
    </div>

  </div>
</div>

<script src="BullyingRoleplay.js"></script>

</body>
</html>

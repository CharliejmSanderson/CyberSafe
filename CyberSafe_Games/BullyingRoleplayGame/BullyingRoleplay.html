<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bullying Roleplay</title>

  <style>
    body {
      background: #dfe7df;
      font-family: Arial;
    }

    .phone {
      width: 360px;
      height: 640px;
      margin: 20px auto;
      background: #fff;
      border-radius: 25px;
      overflow-y: auto;
      box-shadow: 0 0 15px gray;
    }

    .topbar {
      background: #2e7d32;
      color: white;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .title {
      font-weight: bold;
    }

    .chat-list {
      padding: 10px;
      height: calc(100% - 60px);
      overflow-y: auto;
    }

    .chat-item {
      display: flex;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #c8e6c9;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 10px;
      font-size: 20px;
    }

    .chat-area {
      padding: 10px;
      height: 350px;
      overflow-y: auto;
      background: #f5f5f5;
    }

    .bot, .user {
      padding: 10px;
      border-radius: 10px;
      margin: 5px;
      max-width: 70%;
    }

    .bot {
      background: #fff;
    }

    .user {
      background: #4caf50;
      color: white;
      margin-left: auto;
    }

    .input-bar {
      display: flex;
      padding: 10px;
      border-top: 1px solid #ddd;
    }

    .input-bar input {
      flex: 1;
      padding: 8px;
      border-radius: 20px;
      border: 1px solid #ccc;
    }

    .input-bar button {
      margin-left: 5px;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 50%;
      width: 35px;
      height: 35px;
    }

    .options button, .reply-btn {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 25px;
      border: none;
      font-weight: bold;
      font-size: 15px;
      color: white;
      cursor: pointer;
    }

    .red { background: #ef5350; }
    .orange { background: #ffa726; }
    .green { background: #66bb6a; }

    .reply-btn {
      background: #2e7d32;
    }

    .progress-card {
      margin: 15px;
      padding: 15px;
      background: linear-gradient(135deg, #43a047, #2e7d32);
      color: white;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .progress-bar {
      background: rgba(255,255,255,0.3);
      border-radius: 20px;
      height: 12px;
      margin: 10px 0;
    }

    .progress-fill {
      background: white;
      height: 100%;
      border-radius: 20px;
    }

    .achievements {
      padding: 10px;
    }

    .achievement-card {
      display: flex;
      align-items: center;
      background: #e8f5e9;
      border: 2px solid #66bb6a;
      border-radius: 15px;
      padding: 12px;
      margin: 10px 0;
    }

    .icon-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #2e7d32;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 10px;
      font-size: 18px;
    }

    .achievement-text {
      flex: 1;
    }

    .achievement-text small {
      display: block;
      color: #555;
    }

    .unlocked-text {
      color: green;
      font-size: 12px;
    }

    .setting-option {
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      cursor: pointer;
      background: #f5f5f5;
    }

    /* ✅ FIXED THEME SYSTEM (APPLIES TO PHONE ONLY) */

    .phone.dark-theme {
      background: #1e1e1e;
      color: white;
    }

    .phone.dark-theme .topbar {
      background: #000;
    }

    .phone.dark-theme .bot {
      background: #2c2c2c;
      color: white;
    }

    .phone.dark-theme .user {
      background: #388e3c;
    }

    .phone.light-theme {
      background: #ffffff;
      color: black;
    }

    .phone.light-theme .topbar {
      background: #1976d2;
      color: white;
    }

    .phone.yellow-theme {
      background: #fff8e1;
      color: #000;
    }

    .phone.yellow-theme .topbar {
      background: #fbc02d;
      color: black;
    }

  </style>
</head>

<body>

<div class="phone">
  <div id="screen"></div>
</div>

<script src="BullyingRoleplay.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Safe Posting Online</title>

<style>

body{
    margin:0;
    background:#f7d6d6;
    font-family:Arial, sans-serif;
    min-height:100vh;
}

/* FONT SCALE */
:root{ --font-scale:1; }
html{ font-size:calc(16px * var(--font-scale)); }

/* FULL WIDTH CONTAINER - no phone shell */
.phone{
    width:100%;
    min-height:100vh;
    background:white;
}

/* TOPBAR */
.topbar{
    background:#4b2e83;
    color:white;
    padding:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:1.25rem;
    font-weight:bold;
}

.topbar span{
    cursor:pointer;
}

/* CONTENT */
.content{
    padding:25px;
    text-align:center;
    max-width:540px;
    margin:0 auto;
}

h1{
    font-size:1.75rem;
    color:#4b2e83;
}

h2{
    font-size:1.5rem;
}

/* PROGRESS BAR */
.progress-box{
    background:#eee;
    height:18px;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:20px;
}

.progress{
    height:100%;
    background:#66bb6a;
    width:0%;
}

/* CARD */
.card{
    background:#f4f0ff;
    border:3px solid #4b2e83;
    border-radius:25px;
    padding:35px 20px;
    margin-top:20px;
    margin-bottom:25px;
    font-size:1.75rem;
    font-weight:bold;
    color:#222;
}

/* BUTTONS */
.answer-btn{
    width:100%;
    padding:22px;
    border:none;
    border-radius:20px;
    font-size:1.5rem;
    font-weight:bold;
    margin-bottom:18px;
    cursor:pointer;
}

.safe-btn{
    background:#4caf50;
    color:white;
}

.unsafe-btn{
    background:#e53935;
    color:white;
}

.next-btn{
    background:#1e88e5;
    color:white;
    width:100%;
    padding:18px;
    border:none;
    border-radius:20px;
    font-size:1.375rem;
    margin-top:25px;
    cursor:pointer;
}

/* RESULT */
.result-title{
    font-size:2.375rem;
    font-weight:bold;
    margin-top:20px;
}

.good{
    color:#2e7d32;
}

.bad{
    color:#c62828;
}

/* BADGES */
.badge{
    background:#f4f0ff;
    border:2px solid #4b2e83;
    border-radius:18px;
    padding:14px;
    margin-top:12px;
    font-size:1.25rem;
}

/* SETTINGS */
.setting-option{
    background:#f4f0ff;
    border:2px solid #4b2e83;
    border-radius:18px;
    padding:18px;
    margin-top:15px;
    font-size:1.375rem;
    cursor:pointer;
}

/* DARK THEME */
.phone.dark-theme{
    background:#121212;
    color:white;
}

.phone.dark-theme .card{
    background:#1f1f1f;
    color:white;
}

.phone.dark-theme .topbar{
    background:black;
}

/* HIGH CONTRAST */
.phone.high-contrast{
    background:black;
    color:yellow;
}

.phone.high-contrast .topbar{
    background:yellow;
    color:black;
}

.phone.high-contrast .card{
    background:black;
    color:yellow;
    border-color:yellow;
}

/* HIGH CONTRAST DARK */
.phone.contrast-dark{
    background:#000000;
    color:#ffffff;
}

.phone.contrast-dark .topbar{
    background:#000000;
    color:#ffd400;
}

.phone.contrast-dark .card{
    background:#111111;
    color:#ffffff;
    border-color:#ffd400;
}

.phone.contrast-dark h1,
.phone.contrast-dark h2{
    color:#ffd400;
}

/* HIGH CONTRAST LIGHT */
.phone.contrast-light{
    background:#ffffff;
    color:#000000;
}

.phone.contrast-light .topbar{
    background:#0066cc;
    color:#ffffff;
}

.phone.contrast-light .card{
    background:#f0f0f0;
    color:#000000;
    border-color:#0066cc;
}

/* BLUE-YELLOW ACCESSIBLE */
.phone.blue-yellow{
    background:#0b1f3a;
    color:#ffffff;
}

.phone.blue-yellow .topbar{
    background:#ffcc00;
    color:#000000;
}

.phone.blue-yellow .card{
    background:#1a3a6e;
    color:#ffffff;
    border-color:#ffcc00;
}

.phone.blue-yellow h1{
    color:#ffcc00;
}

.phone.blue-yellow .next-btn{
    background:#ffcc00;
    color:#000000;
}

/* SETTINGS MODAL */
.settings-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:100;
}

.settings-overlay.active{
    display:flex;
}

.settings-sheet{
    background:#f4f0ff;
    border-top:3px solid #4b2e83;
    border-radius:25px 25px 0 0;
    padding:25px 20px 35px;
    width:100%;
    max-width:540px;
    max-height:85vh;
    overflow-y:auto;
    position:relative;
}

.settings-modal-title{
    font-size:1.375rem;
    font-weight:bold;
    color:#4b2e83;
    margin-bottom:16px;
}

.settings-section-label{
    font-size:13px;
    font-weight:bold;
    color:#888;
    text-transform:uppercase;
    letter-spacing:1px;
    margin:14px 0 8px;
}

.settings-btn{
    width:100%;
    padding:14px;
    border:2px solid #4b2e83;
    border-radius:14px;
    background:white;
    color:#4b2e83;
    font-size:1rem;
    font-weight:bold;
    text-align:left;
    cursor:pointer;
    margin-bottom:8px;
}

.settings-btn:last-child{ margin-bottom:0; }

.settings-size-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-bottom:8px;
}

.settings-size-grid .settings-btn{
    text-align:center;
    padding:14px 8px;
    height:52px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:0.9rem;
}

.settings-done-btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:#4b2e83;
    color:white;
    font-size:1.125rem;
    font-weight:bold;
    cursor:pointer;
    margin-top:14px;
}

.settings-close-btn{
    position:absolute;
    top:14px;
    right:14px;
    width:32px;
    height:32px;
    border-radius:50%;
    border:none;
    background:#ddd;
    color:#333;
    font-size:1rem;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* SPEAK BUTTON */
.speak-btn{
    background:none;
    border:none;
    font-size:1.3rem;
    cursor:pointer;
    padding:6px;
    border-radius:50%;
    opacity:0.7;
    display:inline-block;
    vertical-align:middle;
}
.speak-btn:hover{ opacity:1; }

/* TTS TOGGLE ROW */
.tts-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px;
    border:2px solid #4b2e83;
    border-radius:14px;
    background:white;
    margin-bottom:8px;
    font-size:1rem;
    font-weight:bold;
    color:#4b2e83;
    cursor:pointer;
}

/* TOGGLE SWITCH */
.toggle-switch{
    position:relative;
    width:48px;
    height:26px;
    flex-shrink:0;
}
.toggle-switch input{
    opacity:0;
    width:0;
    height:0;
    position:absolute;
}
.toggle-track{
    position:absolute;
    inset:0;
    background:#cccccc;
    border-radius:999px;
    cursor:pointer;
    transition:background 0.2s;
}
.toggle-track::after{
    content:'';
    position:absolute;
    width:20px;
    height:20px;
    background:#ffffff;
    border-radius:50%;
    top:3px;
    left:3px;
    transition:transform 0.2s;
}
.toggle-switch input:checked + .toggle-track{ background:#66bb6a; }
.toggle-switch input:checked + .toggle-track::after{ transform:translateX(22px); }

</style>
</head>

<body>

<div class="phone">
    <div id="screen"></div>
</div>

<!-- SETTINGS MODAL -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-sheet">

    <button class="settings-close-btn" onclick="closeSettings()">&#215;</button>
    <div class="settings-modal-title">Settings</div>

    <div class="settings-section-label">Theme</div>
    <button class="settings-btn" onclick="setTheme('normal')">&#127800; Default</button>
    <button class="settings-btn" onclick="setTheme('dark')">&#127761; Dark</button>
    <button class="settings-btn" onclick="setTheme('contrast-dark')">&#9899; High Contrast Dark</button>
    <button class="settings-btn" onclick="setTheme('contrast-light')">&#9898; High Contrast Light</button>
    <button class="settings-btn" onclick="setTheme('blue-yellow')">&#128309; Blue &amp; Yellow</button>

    <div class="settings-section-label">Text Size</div>
    <div class="settings-size-grid">
      <button class="settings-btn" onclick="setTextSize('small')">Small</button>
      <button class="settings-btn" onclick="setTextSize('medium')">Medium</button>
      <button class="settings-btn" onclick="setTextSize('large')">Large</button>
      <button class="settings-btn" onclick="setTextSize('xlarge')">Extra Large</button>
    </div>

    <div class="settings-section-label">Accessibility</div>
    <div class="tts-row">
      <span>&#128266; Read content aloud</span>
      <label class="toggle-switch" aria-label="Enable text to speech">
        <input type="checkbox" id="ttsToggle" onchange="handleTtsToggle()">
        <span class="toggle-track"></span>
      </label>
    </div>

    <button class="settings-done-btn" onclick="closeSettings()">Done</button>

  </div>
</div>

<script src="SafePosting.js"></script>

</body>
</html>
